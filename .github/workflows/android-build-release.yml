name: Android CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Create local.properties and inject the ImgBB API key from GitHub repository secrets
      - name: Create local.properties
        run: |
          echo "imgbb.api.key=${{ secrets.IMGBB_API_KEY }}" > local.properties

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # Automatically publish/update the compiled APK to a 'latest' pre-release on GitHub
      - name: Upload APK to Latest Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "Latest Development Build"
          files: |
            app/build/outputs/apk/debug/app-debug.apk
